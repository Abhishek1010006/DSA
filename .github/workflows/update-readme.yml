name: Update README

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/badges/**'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: readme-update
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate README + badges
        run: python scripts/generate_readme.py

      - name: Commit and push (with retry on race conditions)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/badges/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "docs: auto-update README stats [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1
